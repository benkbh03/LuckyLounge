<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata plus the shared stylesheet and app logic. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyLounge - Plinko</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body data-game-page="plinko" data-requires-auth="true">
  <main id="app" class="game-app">
    <!-- Shared game-page header with account actions and timer. -->
    <header>
      <h1><a href="index.html">LuckyLounge</a></h1>
      <p>Plinko</p>
      <div id="user-bar" class="user-bar">
        <div class="account-pill">
          <span class="account-label">Signed in</span>
          <strong id="user-greeting"></strong>
        </div>
        <nav class="account-actions" aria-label="Account actions">
          <span class="timer-pill">Timer <strong>00:17:38</strong></span>
          <a class="account-link" href="wallet.html">Balance</a>
          <a class="account-link logout-link" href="#" id="logout-link">Logout</a>
        </nav>
      </div>
    </header>

    <!-- Compact introduction that explains the plinko game. -->
    <section class="game-page-intro">
      <h2>Plinko</h2>
      <p>
        Drop the ball through the board and see where it lands. The result is
        random, so use a small virtual bet and stop whenever you want.
      </p>
    </section>

    <!-- Lightweight reminder to keep play controlled. -->
    <section class="responsible-mini">
      <strong>Responsible play:</strong>
      You are always allowed to stop.
      <a href="https://www.spillemyndigheden.dk/rofus" target="_blank">ROFUS</a>
    </section>

    <!-- Dashboard area for the bet controls and injected game UI. -->
    <section id="dashboard-section">
      <div class="play-controls">
        <div class="balance-row">
          <strong>Virtual balance:</strong> $<span id="balance"></span>
        </div>

        <div class="bet-row">
          <label for="bet-amount">Bet amount:</label>
          <input type="number" id="bet-amount" class="bet-input" min="1" value="5">
          <button id="max-bet-btn" class="max-btn">Max</button>
        </div>
      </div>

      <div id="game-section" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>
