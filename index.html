<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyLounge - Casino Games</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .bet-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .max-btn {
      padding: 7px 16px;
      font-size: 0.9em;
      background: transparent;
      border: 2px solid #17e94f;
      border-radius: 9px;
      color: #17e94f;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 8px #17e94f44;
      transition: background .16s, color .16s, box-shadow .16s;
      margin: 0;
    }
    .max-btn:hover {
      background: #17e94f;
      color: #13121e;
      box-shadow: 0 0 16px #17e94f88;
    }
  </style>
</head>
<body>
<main id="app">
  <header>
    <h1>LuckyLounge</h1>
    <p>Ethical &amp; Responsible Gambling for Everyone</p>
    <div id="user-bar" style="text-align:center; margin-top:6px; font-size:0.92em; color:#9f50ff;">
      👤 <span id="user-greeting"></span>
      &nbsp;·&nbsp;
      <a href="#" onclick="logout()" style="color:#ff3c82; font-weight:600;">Logout</a>
    </div>
  </header>
  <section id="dashboard-section">
    <div style="margin-bottom:15px;">
      <strong>Balance:</strong> $<span id="balance"></span>
    </div>
    <div class="bet-row">
      <label>Bet amount:
        <input type="number" id="bet-amount" min="1" value="5" style="width:60px;">
      </label>
      <button class="max-btn" onclick="setMaxBet()">Max</button>
    </div>
    <hr/>
    <div class="game-buttons">
      <button onclick="showGame('slot')">Slot Machine</button>
      <button onclick="showGame('dice')">Dice Game</button>
      <button onclick="showGame('plinko')">Plinko</button>
    </div>
    <div id="game-section"></div>
    <hr/>
    <button onclick="resetBalance()" style="margin-top:10px;">Reset Balance</button>
    <div style="margin-top:8px;font-size:.97em;">Hvis det tager overhånd <a href="https://www.spillemyndigheden.dk/rofus" target="_blank">Rofus</a></div>
  </section>
</main>
<script src="app.js"></script>
<script>
  (function() {
    const user = sessionStorage.getItem('ll_user');
    if (!user) {
      window.location.href = 'login.html';
    } else {
      const parsed = JSON.parse(user);
      document.getElementById('user-greeting').textContent = parsed.username;
    }
  })();

  function logout() {
    sessionStorage.removeItem('ll_user');
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
